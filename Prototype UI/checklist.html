<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traveloha - Checklist</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={darkMode:'class',theme:{extend:{colors:{brand:{50:'#f4f5f4',100:'#e6e9e6',500:'#8ba888',600:'#6b8a68',900:'#3a4a39'}}}}}</script>
    <script>if(localStorage.theme==='dark'||(!('theme'in localStorage)&&window.matchMedia('(prefers-color-scheme: dark)').matches))document.documentElement.classList.add('dark');else document.documentElement.classList.remove('dark');</script>
    <style>
        *{box-sizing:border-box;}
        #hide-checkbox{opacity:0;height:0;width:0;position:absolute;}.toggle{position:relative;cursor:pointer;display:inline-block;width:200px;height:100px;background:#211042;border-radius:50px;transition:500ms;overflow:hidden;box-shadow:0 10px 15px -3px rgba(0,0,0,0.3);}.toggle-button{position:absolute;display:inline-block;top:7px;left:6px;width:86px;height:86px;border-radius:50%;background:#FAEAF1;overflow:hidden;box-shadow:0 0 35px 4px rgba(255,255,255);transition:all 500ms ease-out;z-index:10;}.crater{position:absolute;display:inline-block;background:#FAEAF1;border-radius:50%;transition:500ms;}.crater-1{background:#FFFFF9;width:86px;height:86px;left:10px;bottom:10px;}.crater-2{width:20px;height:20px;top:-7px;left:44px;}.crater-3{width:16px;height:16px;top:20px;right:-4px;}.crater-4{width:10px;height:10px;top:24px;left:30px;}.crater-5{width:15px;height:15px;top:40px;left:48px;}.crater-6{width:10px;height:10px;top:48px;left:20px;}.crater-7{width:12px;height:12px;bottom:5px;left:35px;}.star{position:absolute;display:inline-block;border-radius:50%;background:#FFF;box-shadow:1px 0 2px 2px rgba(255,255,255);}.star-1{width:6px;height:6px;right:90px;bottom:40px;}.star-2{width:8px;height:8px;right:70px;top:10px;}.star-3{width:5px;height:5px;right:60px;bottom:15px;}.star-4{width:3px;height:3px;right:40px;bottom:50px;}.star-5{width:4px;height:4px;right:10px;bottom:35px;}.star-6,.star-7,.star-8{width:10px;height:2px;border-radius:2px;transform:rotate(-45deg);box-shadow:5px 0px 4px 1px #FFF;animation-name:travel;animation-duration:1.5s;animation-timing-function:ease-out;animation-iteration-count:infinite;}.star-6{right:30px;bottom:30px;animation-delay:-2s;}.star-7{right:50px;bottom:60px;}.star-8{right:90px;top:10px;animation-delay:-4s;}@keyframes travel{0%{transform:rotate(-45deg) translateX(70px);}50%{transform:rotate(-45deg) translateX(-20px);box-shadow:5px 0px 6px 1px #FFF;}100%{transform:rotate(-45deg) translateX(-30px);width:2px;height:2px;opacity:0;box-shadow:none;}}#hide-checkbox:checked+.toggle{background:#24D7F7;}#hide-checkbox:checked+.toggle .toggle-button{background:#F7FFFF;transform:translateX(102px);box-shadow:0 0 35px 5px rgba(255,255,255);}
        .glass-panel{background:rgba(255,255,255,0.65);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.5);box-shadow:0 4px 30px rgba(0,0,0,0.05);}.dark .glass-panel{background:rgba(24,24,27,0.7);border:1px solid rgba(255,255,255,0.08);box-shadow:0 4px 30px rgba(0,0,0,0.2);}
        ::-webkit-scrollbar{width:6px;height:6px;}::-webkit-scrollbar-thumb{background-color:#d4d4d8;border-radius:10px;}.dark ::-webkit-scrollbar-thumb{background-color:#3f3f46;}
        body{background-color:#f2efe8;background-image:radial-gradient(ellipse 90% 70% at 10% 30%,rgba(139,168,136,0.22) 0%,transparent 55%),radial-gradient(ellipse 70% 60% at 90% 10%,rgba(196,181,148,0.18) 0%,transparent 50%),radial-gradient(ellipse 80% 70% at 50% 90%,rgba(152,186,148,0.15) 0%,transparent 55%);}
        html.dark body{background-color:#111912;background-image:radial-gradient(ellipse 90% 70% at 10% 30%,rgba(58,74,57,0.4) 0%,transparent 55%),radial-gradient(ellipse 70% 60% at 90% 10%,rgba(35,55,35,0.3) 0%,transparent 50%),radial-gradient(ellipse 80% 70% at 50% 90%,rgba(45,65,42,0.25) 0%,transparent 55%);}
        html.dark body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;opacity:0.04;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:180px 180px;}
        .progress-bar{height:10px;border-radius:999px;background:rgba(139,168,136,0.15);}
        .progress-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#8ba888,#6b8a68);transition:width 0.5s ease;}
        /* strikethrough when checked */
        label:has(input[type=checkbox]:checked) .item-label{text-decoration:line-through;color:#94a3b8;}
        @keyframes checkPop{0%{transform:scale(1);}40%{transform:scale(1.15);}100%{transform:scale(1);}}
        input[type=checkbox]:checked{animation:checkPop 0.2s ease;}
        @keyframes confetti{0%{opacity:1;transform:translateY(0) rotate(0);}100%{opacity:0;transform:translateY(-40px) rotate(180deg);}}
        .confetti-dot{position:absolute;width:8px;height:8px;border-radius:2px;animation:confetti 0.6s ease forwards;}
    </style>
</head>
<body class="text-zinc-800 dark:text-zinc-300 transition-colors duration-500 pb-24 md:pb-8">

    <nav class="sticky top-4 z-50 glass-panel shadow-sm flex justify-between items-center max-w-7xl mx-auto px-6 py-4 rounded-3xl">
        <div class="flex items-center gap-3">
            <img src="src/logo.png" alt="Travelaroha" class="w-10 h-10 rounded-full object-cover border-2 border-brand-500 shadow-sm bg-white">
            <div class="font-bold text-brand-600 dark:text-brand-500 text-2xl tracking-tight">Travelaroha</div>
        </div>
        <div class="hidden md:flex gap-8 font-medium text-zinc-500 dark:text-zinc-400">
            <a href="index.html" class="relative group px-1 py-2 hover:text-zinc-900 dark:hover:text-white transition-colors">DISCOVERY<span class="absolute -bottom-1 left-0 w-0 h-[2px] bg-zinc-300 dark:bg-zinc-600 rounded-full transition-all duration-300 group-hover:w-full"></span></a>
            <a href="storyboard.html" class="relative group px-1 py-2 hover:text-zinc-900 dark:hover:text-white transition-colors">TRIP STORYBOARD<span class="absolute -bottom-1 left-0 w-0 h-[2px] bg-zinc-300 dark:bg-zinc-600 rounded-full transition-all duration-300 group-hover:w-full"></span></a>
            <a href="dashboard.html" class="relative group px-1 py-2 hover:text-zinc-900 dark:hover:text-white transition-colors">DASHBOARD<span class="absolute -bottom-1 left-0 w-0 h-[2px] bg-zinc-300 dark:bg-zinc-600 rounded-full transition-all duration-300 group-hover:w-full"></span></a>
            <a href="checklist.html" class="relative px-1 py-2 text-zinc-900 dark:text-white font-bold">CHECKLIST<span class="absolute -bottom-1 left-0 w-full h-[2px] bg-zinc-900 dark:bg-white rounded-full"></span></a>
        </div>
        <div class="flex items-center gap-4">
            <div class="w-[80px] h-[40px] flex items-center justify-center overflow-hidden">
                <div style="transform:scale(0.4);transform-origin:center;">
                    <input type="checkbox" id="hide-checkbox">
                    <label for="hide-checkbox" class="toggle m-0"><span class="toggle-button"><span class="crater crater-1"></span></span><span class="star star-1"></span></label>
                </div>
            </div>
            <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=100&q=80" class="w-10 h-10 rounded-full object-cover shadow-md border-2 border-white dark:border-zinc-800 cursor-pointer hover:scale-105 transition-transform">
        </div>
    </nav>

    <main class="max-w-4xl mx-auto mt-12 p-4 space-y-6">

        <!-- Hero -->
        <div class="w-full h-48 md:h-64 rounded-3xl overflow-hidden relative shadow-lg group">
            <img src="https://images.unsplash.com/photo-1488646953014-85cb44e25828?auto=format&fit=crop&w=1200&q=80" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700">
            <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-black/20 to-transparent"></div>
            <div class="absolute bottom-6 left-6 text-white z-10">
                <h2 class="text-3xl md:text-4xl font-bold">Aesthetic Packing</h2>
                <p class="text-sm md:text-base opacity-90 mt-2">เตรียมสัมภาระให้พร้อมก่อนออกเดินทาง ✈️</p>
            </div>
        </div>

        <!-- Overall Progress -->
        <div class="glass-panel p-5 rounded-2xl border border-slate-200/60 dark:border-slate-700/60 shadow-sm relative overflow-hidden">
            <div class="flex items-center justify-between mb-3">
                <div class="flex items-center gap-2"><span class="text-xl">📦</span><span class="font-bold">ความคืบหน้าทั้งหมด</span></div>
                <div class="flex items-center gap-3">
                    <span id="overall-text" class="text-sm font-semibold text-brand-600 dark:text-brand-400">0 / 0</span>
                    <button id="reset-btn" class="text-xs text-slate-400 hover:text-rose-500 transition-colors px-3 py-1.5 rounded-xl border border-slate-200 dark:border-slate-700 hover:border-rose-300 bg-white/50 dark:bg-slate-800/50 flex items-center gap-1">🔄 รีเซ็ต</button>
                </div>
            </div>
            <div class="progress-bar">
                <div id="overall-fill" class="progress-fill" style="width:0%"></div>
            </div>
            <div id="done-msg" class="hidden mt-3 text-center text-sm font-bold text-brand-600 dark:text-brand-400">🎉 เก็บของครบแล้ว! พร้อมออกเดินทางได้เลย ✈️</div>
        </div>

        <!-- Sections injected by JS -->
        <div id="sections-container"></div>

    </main>

    <!-- Mobile Bottom Nav -->
    <nav class="fixed bottom-0 left-0 right-0 z-50 md:hidden glass-panel border-t border-slate-200/60 dark:border-slate-700/60 flex justify-around items-center py-2 px-2">
        <a href="index.html" class="flex flex-col items-center gap-0.5 px-3 py-1.5 rounded-2xl text-slate-400 min-w-[56px]"><span class="text-xl">🔍</span><span class="text-[10px] font-medium">Discover</span></a>
        <a href="storyboard.html" class="flex flex-col items-center gap-0.5 px-3 py-1.5 rounded-2xl text-slate-400 min-w-[56px]"><span class="text-xl">🗺️</span><span class="text-[10px] font-medium">Storyboard</span></a>
        <a href="dashboard.html" class="flex flex-col items-center gap-0.5 px-3 py-1.5 rounded-2xl text-slate-400 min-w-[56px]"><span class="text-xl">📊</span><span class="text-[10px] font-medium">Dashboard</span></a>
        <a href="checklist.html" class="flex flex-col items-center gap-0.5 px-3 py-1.5 rounded-2xl bg-brand-500/10 text-brand-600 dark:text-brand-400 min-w-[56px]"><span class="text-xl">✅</span><span class="text-[10px] font-bold">Checklist</span></a>
    </nav>

<script>
// ── Theme ──
const toggleInput=document.getElementById('hide-checkbox');
if(document.documentElement.classList.contains('dark'))toggleInput.checked=false;else toggleInput.checked=true;
toggleInput.addEventListener('change',(e)=>{if(e.target.checked){document.documentElement.classList.remove('dark');localStorage.setItem('theme','light');}else{document.documentElement.classList.add('dark');localStorage.setItem('theme','dark');}});

// ── localStorage key ──
const LS_CHECK = 'travelaroha_checklist'; // {id: boolean}

// ── Checklist data ──
const SECTIONS = [
    {
        id:'docs', icon:'📄', title:'เอกสารสำคัญ',
        items:[
            {id:'doc1',label:'พาสปอร์ต / วีซ่า'},
            {id:'doc2',label:'ตั๋วเครื่องบิน / บัตรโดยสาร'},
            {id:'doc3',label:'เอกสารจองที่พัก / โรงแรม'},
            {id:'doc4',label:'กรมธรรม์ประกันการเดินทาง'},
            {id:'doc5',label:'บัตรประชาชน / ใบขับขี่สากล'},
            {id:'doc6',label:'บัตรเครดิต / เงินสด / Travel Card'},
        ]
    },
    {
        id:'elec', icon:'💻', title:'อุปกรณ์อิเล็กทรอนิกส์',
        items:[
            {id:'el1',label:'สมาร์ทโฟน / แท็บเล็ต'},
            {id:'el2',label:'สายชาร์จและอแดปเตอร์'},
            {id:'el3',label:'พาวเวอร์แบงค์ (Power Bank)'},
            {id:'el4',label:'หูฟัง / AirPods'},
            {id:'el5',label:'กล้องถ่ายรูป / เมมโมรี่การ์ด'},
            {id:'el6',label:'เข็มจิ้มซิม / ซิมการ์ดต่างประเทศ'},
        ]
    },
    {
        id:'clothes', icon:'👕', title:'เสื้อผ้าและเครื่องแต่งกาย',
        items:[
            {id:'cl1',label:'เสื้อยืด / เสื้อเชิ้ต'},
            {id:'cl2',label:'กางเกงขาสั้น / ขายาว'},
            {id:'cl3',label:'ชุดนอน'},
            {id:'cl4',label:'ชุดชั้นใน / กางเกงใน'},
            {id:'cl5',label:'ถุงเท้า'},
            {id:'cl6',label:'เสื้อกันหนาว / แจ็คเก็ต'},
            {id:'cl7',label:'รองเท้าผ้าใบ (ใส่เดินสบาย)'},
            {id:'cl8',label:'รองเท้าแตะ'},
            {id:'cl9',label:'แว่นตากันแดด / หมวก'},
            {id:'cl10',label:'กระเป๋าสะพายใบเล็ก / เป้'},
        ]
    },
    {
        id:'personal', icon:'🧳', title:'ของใช้ส่วนตัวและยา',
        items:[
            {id:'pe1',label:'แปรงสีฟัน / ยาสีฟัน'},
            {id:'pe2',label:'ครีมอาบน้ำ / แชมพู (ขนาดพกพา)'},
            {id:'pe3',label:'สกินแคร์ / ครีมกันแดด'},
            {id:'pe4',label:'ยาประจำตัว'},
            {id:'pe5',label:'ยาแก้ปวด / ยาแก้แพ้ / พลาสเตอร์'},
            {id:'pe6',label:'ทิชชู่เปียก / ทิชชู่แห้ง'},
            {id:'pe7',label:'หน้ากากอนามัย / เจลล้างมือ'},
        ]
    },
];

// ── State ──
let checked = {};

function loadChecked(){
    try { checked = JSON.parse(localStorage.getItem(LS_CHECK)||'{}'); } catch(e){ checked={}; }
}
function saveChecked(){
    localStorage.setItem(LS_CHECK, JSON.stringify(checked));
}

// ── Render sections ──
function renderSections(){
    const container = document.getElementById('sections-container');
    container.innerHTML = '';
    SECTIONS.forEach(sec=>{
        const div = document.createElement('div');
        div.className='glass-panel p-6 rounded-3xl shadow-sm border border-slate-200/60 dark:border-slate-700/60';
        div.dataset.secId = sec.id;
        div.innerHTML=`
          <div class="flex items-center justify-between mb-4">
            <h3 class="font-bold text-xl text-brand-600 dark:text-brand-400">${sec.icon} ${sec.title}</h3>
            <span class="sec-count text-xs font-medium bg-brand-50 dark:bg-brand-900/30 text-brand-600 dark:text-brand-400 px-2.5 py-1 rounded-full border border-brand-100 dark:border-brand-800 transition-all">0/${sec.items.length}</span>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-3">${
              sec.items.map(item=>`
                <label class="flex items-center p-3 bg-white dark:bg-slate-800 rounded-2xl border border-slate-100 dark:border-slate-700 cursor-pointer hover:border-brand-300 transition-colors gap-3" data-item-id="${item.id}">
                  <input type="checkbox" data-id="${item.id}" class="check-item w-4.5 h-4.5 accent-brand-600 flex-shrink-0" style="width:1.1rem;height:1.1rem;" ${checked[item.id]?'checked':''}>
                  <span class="item-label font-medium text-slate-700 dark:text-slate-300 text-sm">${item.label}</span>
                </label>`).join('')
          }</div>`;
        container.appendChild(div);
    });

    // Attach listeners
    document.querySelectorAll('.check-item').forEach(cb=>{
        cb.addEventListener('change', ()=>{
            checked[cb.dataset.id] = cb.checked;
            saveChecked();
            updateProgress();
            if(cb.checked) spawnConfetti(cb);
        });
    });
    updateProgress();
}

// ── Progress ──
function updateProgress(){
    const allCbs = document.querySelectorAll('.check-item');
    let total=allCbs.length, done=0;
    allCbs.forEach(cb=>{ if(cb.checked) done++; });
    document.getElementById('overall-text').textContent = `${done} / ${total} รายการ`;
    document.getElementById('overall-fill').style.width = total>0?`${done/total*100}%`:'0%';
    document.getElementById('done-msg').classList.toggle('hidden', done<total);

    // Per-section
    SECTIONS.forEach(sec=>{
        const div = document.querySelector(`[data-sec-id="${sec.id}"]`);
        if(!div) return;
        const sCbs = div.querySelectorAll('.check-item');
        let sDone=0; sCbs.forEach(c=>{ if(c.checked) sDone++; });
        const countEl = div.querySelector('.sec-count');
        if(sDone===sCbs.length && sCbs.length>0){
            countEl.textContent='✓ ครบ!';
            countEl.classList.add('bg-brand-500','text-white','border-brand-500');
            countEl.classList.remove('text-brand-600','bg-brand-50','dark:bg-brand-900/30','dark:text-brand-400','border-brand-100','dark:border-brand-800');
        } else {
            countEl.textContent=`${sDone}/${sCbs.length}`;
            countEl.classList.remove('bg-brand-500','text-white','border-brand-500');
            countEl.classList.add('text-brand-600','bg-brand-50','dark:bg-brand-900/30','dark:text-brand-400','border-brand-100','dark:border-brand-800');
        }
    });
}

// ── Confetti micro-animation ──
function spawnConfetti(el){
    const rect = el.getBoundingClientRect();
    const colors = ['#8ba888','#6b8a68','#fbbf24','#34d399','#60a5fa'];
    for(let i=0;i<5;i++){
        const dot = document.createElement('div');
        dot.className='confetti-dot';
        dot.style.cssText=`left:${rect.left+rect.width/2+Math.random()*30-15}px;top:${rect.top+window.scrollY}px;background:${colors[i]};position:absolute;z-index:9999;animation-delay:${i*0.06}s`;
        document.body.appendChild(dot);
        setTimeout(()=>dot.remove(), 700);
    }
}

// ── Reset ──
document.getElementById('reset-btn').addEventListener('click',()=>{
    if(!confirm('รีเซ็ตทุกรายการ?')) return;
    checked={};
    saveChecked();
    document.querySelectorAll('.check-item').forEach(cb=>{ cb.checked=false; });
    updateProgress();
});

// ── Init ──
loadChecked();
renderSections();
</script>
</body>
</html>
