function getPlaceName(thaiName) {
  if (_lang === 'th') return thaiName;
  return PLACE_NAMES[thaiName]?.[_lang] || PLACE_NAMES[thaiName]?.['en'] || thaiName;
}

// ─── Helper: translate place description ───────────────────────────────────────
function getPlaceDesc(thaiName) {
  const row = PLACE_DESCS[thaiName];
  if (!row) return '';
  return row[_lang] || row['en'] || '';
}

// ─── Helper: get translated country fields ─────────────────────────────────────
function getCountryI18n(key) {
  const c = DB_COUNTRIES[key];
  if (!c) return null;
  const l = _lang;
  return {
    name:       c.name[l]       || c.name['en'],
    desc:       c.desc[l]       || c.desc['en'],
    badge:      c.badge[l]      || c.badge['en'],
    lang:       c.lang[l]       || c.lang['en'],
    season:     c.season[l]     || c.season['en'],
    visa:       c.visa[l]       || c.visa['en'],
    flight:     c.flight[l]     || c.flight['en'],
    highlights: c.highlights[l] || c.highlights['en'],
  };
}

// ─── Core i18n engine ────────────────────────────────────────────────────────
let _lang = localStorage.getItem('travelaroha_lang') || 'th';

function t(key) {
  const row = I18N[key];
  if (!row) return key;
  return row[_lang] || row['en'] || key;
}

function setLang(lang) {
  if (!LANGS[lang]) return;
  _lang = lang;
  localStorage.setItem('travelaroha_lang', lang);
  document.documentElement.lang = lang;
  document.documentElement.dir  = LANGS[lang].dir;
  applyLang();
  _rebuildSwitcher();
  if (typeof window.onLangChange === 'function') window.onLangChange(lang);
}

function applyLang() {
  document.documentElement.dir = LANGS[_lang]?.dir || 'ltr';
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const val = t(el.getAttribute('data-i18n'));
    if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') el.placeholder = val;
    else el.textContent = val;
  });
}

// ─── Language switcher ───────────────────────────────────────────────────────
let _swContainerId = null;

function _rebuildSwitcher() {
  if (_swContainerId) renderLangSwitcher(_swContainerId);
}

function renderLangSwitcher(containerId) {
  _swContainerId = containerId;
  const wrap = document.getElementById(containerId);
  if (!wrap) return;

  const isDark = document.documentElement.classList.contains('dark');
  const menuBg     = isDark ? '#1a2420' : '#ffffff';
  const menuBorder = isDark ? '1px solid rgba(255,255,255,0.1)' : '1px solid rgba(0,0,0,0.09)';
  const menuColor  = isDark ? '#d4d4d8' : '#18181b';

  wrap.innerHTML = `
    <div id="lang-sw" style="position:relative;display:flex;align-items:center;">
      <button onclick="_toggleLangMenu()" style="
        display:flex;align-items:center;gap:5px;padding:5px 11px;
        background:rgba(255,255,255,0.2);backdrop-filter:blur(8px);
        border:1px solid rgba(255,255,255,0.35);border-radius:999px;
        font-size:12px;font-weight:600;cursor:pointer;color:inherit;
        transition:all 0.2s;white-space:nowrap;line-height:1.4;">
        <span style="font-size:15px">${LANGS[_lang].flag}</span>
        <span>${LANGS[_lang].label}</span>
        <svg width="8" height="6" viewBox="0 0 8 6" fill="currentColor" style="opacity:.5">
          <path d="M0 0l4 6 4-6z"/>
        </svg>
      </button>
      <div id="lang-menu" style="
        display:none;position:absolute;top:calc(100% + 8px);right:0;
        background:${menuBg};border:${menuBorder};border-radius:16px;color:${menuColor};
        box-shadow:0 8px 32px rgba(0,0,0,0.2);padding:6px;min-width:152px;z-index:10000;">
        ${Object.entries(LANGS).map(([code, l]) => `
          <button onclick="setLang('${code}')" style="
            width:100%;text-align:start;padding:8px 12px;border-radius:10px;
            display:flex;align-items:center;gap:9px;font-size:13px;font-weight:500;
            background:${code === _lang ? 'rgba(139,168,136,0.2)' : 'transparent'};
            cursor:pointer;color:inherit;border:none;transition:background 0.12s;"
            onmouseover="this.style.background='rgba(139,168,136,0.18)'"
            onmouseout="this.style.background='${code === _lang ? 'rgba(139,168,136,0.2)' : 'transparent'}'">
            <span style="font-size:17px;line-height:1">${l.flag}</span>
            <span>${l.label}</span>
            ${code === _lang ? '<span style="margin-left:auto;color:#6b8a68;font-size:12px">✓</span>' : ''}
          </button>`).join('')}
      </div>
    </div>`;

  // Close on outside click
  document.addEventListener('click', function _close(e) {
    const sw = document.getElementById('lang-sw');
    if (sw && !sw.contains(e.target)) {
      const m = document.getElementById('lang-menu');
      if (m) m.style.display = 'none';
    }
  });
}

// Rebuild switcher when dark/light theme changes
(function _watchTheme() {
  const obs = new MutationObserver(() => _rebuildSwitcher());
  obs.observe(document.documentElement, { attributes: true, attributeFilter: ['class'] });
})();

window._toggleLangMenu = function() {
  const m = document.getElementById('lang-menu');
  if (m) m.style.display = m.style.display === 'block' ? 'none' : 'block';
};

        ];

        // ── localStorage helpers ──
        const LS_SAVED = 'travelaroha_saved'; // string[]
        let savedPlaces = JSON.parse(localStorage.getItem(LS_SAVED)||'[]');
        function persist(){ localStorage.setItem(LS_SAVED, JSON.stringify(savedPlaces)); }

        // ── State ──
        let currentVibe = 'All';
        let savedMode   = false;

        // ── UI refs ──
        const canvas    = document.getElementById('places-canvas');
        const emptyEl   = document.getElementById('empty-state');
        const savedBtn  = document.getElementById('show-saved-btn');
        const savedPill = document.getElementById('saved-count-pill');

        function updateBadge(){
            savedPill.textContent = savedPlaces.length;
        }

        window.setSavedMode = function(on){
            savedMode = on;
            savedBtn.classList.toggle('saved-mode-active', on);
            savedBtn.classList.toggle('bg-rose-50', on);
            document.getElementById('show-saved-label').textContent = on ? t('idx_saved_on') : t('idx_saved_btn');
            // reset vibe filter to All when entering saved mode
            if(on){ document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active')); document.querySelector('[data-vibe="All"]').classList.add('active'); currentVibe='All'; }
            render();
        }

        function render(){
            canvas.innerHTML='';
            let data = PLACES;
            if(savedMode) data = PLACES.filter(p => savedPlaces.includes(p.name));
            else if(currentVibe !== 'All') data = PLACES.filter(p => p.vibe === currentVibe);

            if(data.length===0){
                emptyEl.classList.remove('hidden'); emptyEl.classList.add('flex');
                canvas.style.display='none'; return;
            }
            emptyEl.classList.add('hidden'); emptyEl.classList.remove('flex');
            canvas.style.display='';

            data.forEach((place,i)=>{
                // Varied layout: large cards at different positions using a pattern
                const groupOf5 = Math.floor(i/5);
                const posInGroup = i % 5;
                // Pattern cycles: first card large at pos 0, then at pos 2, then pos 1, then pos 4
                const largePositions = [0, 2, 1, 4, 3];
                const isLarge = data.length >= 4 && posInGroup === largePositions[groupOf5 % largePositions.length];
                const isSaved = savedPlaces.includes(place.name);
                canvas.insertAdjacentHTML('beforeend',`
                <div class="place-card ${isLarge?'col-span-2 row-span-2':'col-span-1 row-span-1'} rounded-3xl relative overflow-hidden group shadow-md cursor-pointer" style="animation-delay:${i*0.04}s">
                    <img src="${place.img}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" loading="lazy">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/10 to-transparent"></div>
                    <div class="absolute bottom-4 left-4 z-20 text-white">
                        <span class="px-2 py-1 bg-white/20 backdrop-blur-md rounded-md text-xs font-medium mb-2 inline-flex items-center gap-1">${VIBE_ICONS[place.vibe]||""} ${place.vibe}</span>
                        <h3 class="font-bold ${isLarge?'text-2xl':'text-base'} leading-tight">${getPlaceName(place.name)}</h3>
                        <p class="text-xs sm:text-sm text-slate-200/90 mt-1 leading-snug line-clamp-2">${getPlaceDesc(place.name)||place.desc}</p>
                    </div>
                    <button data-name="${place.name}" class="save-btn absolute top-4 right-4 z-20 w-9 h-9 flex items-center justify-center backdrop-blur-md rounded-full hover:scale-110 transition-all ${isSaved?'bg-white text-rose-500 shadow-md':'bg-black/20 text-white'}">${isSaved?SVG_HEART_FILLED:SVG_HEART_OUTLINE}</button>
                </div>`);
            });

            canvas.querySelectorAll('.save-btn').forEach(btn=>{
                btn.addEventListener('click',e=>{
                    e.stopPropagation();
                    const name=btn.dataset.name;
                    const idx=savedPlaces.indexOf(name);
                    if(idx===-1){
                        savedPlaces.push(name);
                        btn.innerHTML=SVG_HEART_FILLED; btn.classList.add('bg-white','text-rose-500','shadow-md'); btn.classList.remove('bg-black/20','text-white');
                    } else {
                        savedPlaces.splice(idx,1);
                        btn.textContent='🤍'; btn.innerHTML=SVG_HEART_OUTLINE; btn.classList.remove('bg-white','text-rose-500','shadow-md'); btn.classList.add('bg-black/20','text-white');
                        if(savedMode) btn.closest('.place-card').remove(); // live-remove in saved mode
                    }
                    persist(); updateBadge();
                    // re-render empty check in saved mode
                    if(savedMode && savedPlaces.length===0) render();
                });
            });
        }

        savedBtn.addEventListener('click',()=> setSavedMode(!savedMode));

        document.querySelectorAll('.filter-btn').forEach(btn=>{
            btn.addEventListener('click',()=>{
                savedMode=false; savedBtn.classList.remove('saved-mode-active','bg-rose-50');
                document.getElementById('show-saved-label').textContent=t('idx_saved_btn');
                document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
                btn.classList.add('active');
                currentVibe = btn.getAttribute('data-vibe');
                render();
            });
        });

        updateBadge(); render();
    </script>
</body>
</html>
