<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🚀 Space Shooter</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Sarabun:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            orbitron: ['Orbitron', 'monospace'],
            sarabun: ['Sarabun', 'sans-serif'],
          },
          keyframes: {
            'pulse-bg': {
              '0%':   { background: 'rgba(30,0,0,0.85)' },
              '100%': { background: 'rgba(60,0,0,0.92)' },
            },
            flicker: {
              '0%, 100%': { opacity: '1' },
              '50%':      { opacity: '0.6' },
            },
            'bounce-in': {
              from: { transform: 'scale(0.7)', opacity: '0' },
              to:   { transform: 'scale(1)',   opacity: '1' },
            },
            'glow-pulse': {
              '0%, 100%': { textShadow: '0 0 10px #00ccff, 0 0 20px rgba(0,204,255,0.4)' },
              '50%':      { textShadow: '0 0 20px #00ccff, 0 0 40px rgba(0,204,255,0.7), 0 0 60px rgba(0,204,255,0.3)' },
            },
          },
          animation: {
            'pulse-bg':   'pulse-bg 0.4s ease-in-out infinite alternate',
            'flicker':    'flicker 0.4s infinite',
            'bounce-in':  'bounce-in 0.4s cubic-bezier(.68,-.55,.27,1.55)',
            'glow-pulse': 'glow-pulse 2s ease-in-out infinite',
          },
        }
      }
    }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #app {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      font-family: 'Sarabun', sans-serif;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
